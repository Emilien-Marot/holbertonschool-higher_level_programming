{% extends "index.html" %}
{% block content %}
{% if err|length > 0 %}
{{ err }}
{% else %}
<table>
    <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
    </tr>
    {% for item in items %}
    <tr>
        <td>{{ item["name"] }}</td>
        <td>{{ item["category"] }}</td>
        <td>{{ item["price"] }}</td>
    </tr>
    {% endfor %}
</table>
{% endif %}
{% endblock %}
